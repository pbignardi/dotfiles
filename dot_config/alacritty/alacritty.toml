live_config_reload = true
import = [
    "~/.config/alacritty/themes/hybrid.toml"
]

[env]
TERM = "xterm-256color"

[window]
dimensions.columns = 100
dimensions.lines = 26
option_as_alt = "Both"

[font]
size=15
normal.family = "SauceCodePro Nerd Font"
normal.style = "Regular"

[cursor]
style.shape="Block"

[terminal]
osc52="CopyPaste"
